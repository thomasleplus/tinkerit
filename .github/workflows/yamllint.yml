---
name: "YAMLLint"

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  yamllint:
    name: Check with YAMLLint
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run YAMLLint
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          yamllint -d '{extends: default, rules: {line-length: disable}}' .
